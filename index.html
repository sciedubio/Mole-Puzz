<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>분자 퍼즐 마스터</title>
    
    <!-- React & Tailwind (버전 고정으로 안정성 확보) -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans KR"', 'sans-serif'] },
                }
            }
        }
    </script>
    
    <style>
        :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            overflow: hidden; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
            overscroll-behavior-y: none; 
        }
        .h-screen-safe { height: 100dvh; height: calc(var(--vh, 1vh) * 100); }
        
        .scrollable-panel { overflow-y: auto; touch-action: pan-y; }
        .scrollable-panel::-webkit-scrollbar { width: 4px; }
        .scrollable-panel::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .scrollable-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        @keyframes popUp { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.8); opacity: 0; } 20% { transform: translateY(-20px) scale(1.1); opacity: 1; } 80% { transform: translateY(-60px) scale(1); opacity: 1; } 100% { transform: translateY(-80px) scale(0.9); opacity: 0; } }
        .animate-float { animation: floatUp 1.5s ease-out forwards; pointer-events: none; }

        @keyframes pulse-fast { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } }
        .animate-pulse-fast { animation: pulse-fast 0.5s ease-in-out infinite; }
        
        @keyframes slidedown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slidedown { animation: slidedown 0.3s ease-out forwards; }
        
        @keyframes spin-slow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 2s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

<script type="text/babel">
// iOS Height Fix
const setVH = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', setVH); setVH();

// Google Apps Script URL (배포 후 이곳에 붙여넣으세요)
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqmvZ02o6p5BYY_MhHPXtwdZ61PYtnfW2h0L_e0COBdxKLsCh7FnVIXTZ9hXlJzT4/exec"; 

// ==========================================
// 게임 데이터 및 설정
// ==========================================
const ATOM_INFO = {
    H: { color: '#f8fafc', text: '#0f172a' }, O: { color: '#ef4444', text: '#ffffff' },
    C: { color: '#64748b', text: '#ffffff' }, N: { color: '#3b82f6', text: '#ffffff' },
    Cl:{ color: '#22c55e', text: '#ffffff' }, S: { color: '#eab308', text: '#0f172a' },
    F: { color: '#d946ef', text: '#ffffff' }
};

const ATOM_POOL = ['H','H','H','H','H','H','O','O','O','O','O','C','C','C','N','N','Cl','Cl','F','F','F','S'];

const MOLECULES = [
    { id: 'H2', name: '수소 기체', formulaHtml: 'H<sub>2</sub>', formula: { H: 2 } },
    { id: 'O2', name: '산소 기체', formulaHtml: 'O<sub>2</sub>', formula: { O: 2 } },
    { id: 'N2', name: '질소 기체', formulaHtml: 'N<sub>2</sub>', formula: { N: 2 } },
    { id: 'Cl2', name: '염소 기체', formulaHtml: 'Cl<sub>2</sub>', formula: { Cl: 2 } },
    { id: 'F2', name: '플루오린 기체', formulaHtml: 'F<sub>2</sub>', formula: { F: 2 } },
    { id: 'H2O', name: '물', formulaHtml: 'H<sub>2</sub>O', formula: { H: 2, O: 1 } },
    { id: 'CO2', name: '이산화 탄소', formulaHtml: 'CO<sub>2</sub>', formula: { C: 1, O: 2 } },
    { id: 'CH4', name: '메테인', formulaHtml: 'CH<sub>4</sub>', formula: { C: 1, H: 4 } },
    { id: 'NH3', name: '암모니아', formulaHtml: 'NH<sub>3</sub>', formula: { N: 1, H: 3 } },
    { id: 'HCl', name: '염화 수소', formulaHtml: 'HCl', formula: { H: 1, Cl: 1 } },
    { id: 'H2O2', name: '과산화 수소', formulaHtml: 'H<sub>2</sub>O<sub>2</sub>', formula: { H: 2, O: 2 } },
    { id: 'O3', name: '오존', formulaHtml: 'O<sub>3</sub>', formula: { O: 3 } },
    { id: 'SO2', name: '이산화 황', formulaHtml: 'SO<sub>2</sub>', formula: { S: 1, O: 2 } },
    { id: 'CF4', name: '사플루오린화 탄소', formulaHtml: 'CF<sub>4</sub>', formula: { C: 1, F: 4 } },
    { id: 'CO', name: '일산화 탄소', formulaHtml: 'CO', formula: { C: 1, O: 1 } },
    { id: 'NO', name: '일산화 질소', formulaHtml: 'NO', formula: { N: 1, O: 1 } },
    { id: 'NO2', name: '이산화 질소', formulaHtml: 'NO<sub>2</sub>', formula: { N: 1, O: 2 } },
    { id: 'H2S', name: '황화 수소', formulaHtml: 'H<sub>2</sub>S', formula: { H: 2, S: 1 } },
    { id: 'HF', name: '플루오린화 수소', formulaHtml: 'HF', formula: { H: 1, F: 1 } },
    { id: 'HCN', name: '사이안화 수소', formulaHtml: 'HCN', formula: { H: 1, C: 1, N: 1 } }
];

const QUIZ_POOL = [
    { q: "물(H₂O)과 과산화 수소(H₂O₂)는 구성 원소가 같으므로 성질도 동일한 분자이다.", a: false, explain: "구성 원소가 같더라도 결합된 원자 개수가 다르면 완전히 다른 성질의 분자가 됩니다." },
    { q: "메테인(CH₄)은 탄소 원자 1개와 수소 원자 4개가 화학 결합을 이룬 분자이다.", a: true, explain: "메테인은 C 1개, H 4개가 결합하여 만들어진 분자입니다." },
    { q: "오존(O₃)은 산소 원자 3개로 구성된, 단 한 가지 원소로만 이루어진 분자이다.", a: true, explain: "오존은 오직 산소(O) 원소 1종류로만 이루어져 있는 단일 원소 물질 분자입니다." },
    { q: "이산화 황(SO₂)은 황 원자 1개와 산소 원자 2개가 결합한 화합물이다.", a: true, explain: "S 1개와 O 2개가 규칙적으로 결합한 이산화 황 화합물 분자가 맞습니다." }
];

const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ==========================================
// 공통 UI 컴포넌트
// ==========================================
const Button = ({ children, onClick, className = "", variant = "primary", disabled=false }) => {
    const base = "font-bold rounded-xl transition-all active:scale-95 flex items-center justify-center disabled:opacity-50 disabled:active:scale-100";
    const variants = {
        primary: "bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-500/20 px-6 py-4 text-lg",
        emerald: "bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg shadow-emerald-500/20 px-6 py-4 text-lg",
        danger: "bg-red-600 hover:bg-red-500 text-white shadow-lg px-6 py-4 text-lg",
        secondary: "bg-slate-700 hover:bg-slate-600 text-slate-100 px-4 py-3 text-sm"
    };
    return <button className={`${base} ${variants[variant]} ${className}`} onClick={onClick} disabled={disabled}>{children}</button>;
};

const Modal = ({ isOpen, onClose, title, children }) => {
    if (!isOpen) return null;
    return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
            <div className="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl flex flex-col max-h-[85dvh]">
                <h2 className="text-xl font-bold mb-4 text-white flex items-center gap-2">{title}</h2>
                <div className="text-slate-300 mb-6 flex-1 overflow-y-auto scrollable-panel pr-1 space-y-4">{children}</div>
                <Button onClick={onClose} className="w-full py-3" variant="secondary">확인</Button>
            </div>
        </div>
    );
};

// 파티클 엔진
class ParticleEngine {
    constructor(canvas) {
        this.canvas = canvas; this.ctx = canvas.getContext('2d');
        this.particles = []; this.width = 0; this.height = 0;
        this.animationId = null;
        this.resize();
    }
    resize() {
        if(!this.canvas || !this.canvas.parentNode) return;
        const rect = this.canvas.parentNode.getBoundingClientRect();
        this.width = rect.width; this.height = rect.height;
        this.canvas.width = this.width * 2; this.canvas.height = this.height * 2;
        this.canvas.style.width = `${this.width}px`; this.canvas.style.height = `${this.height}px`;
        this.ctx.scale(2, 2);
    }
    start() { if(!this.animationId) this.loop(); }
    stop() { cancelAnimationFrame(this.animationId); this.animationId = null; }
    
    explode(x, y, colorStr = '#3b82f6', count = 30) {
        for(let i=0; i<count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 8 + 2;
            this.particles.push({
                x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                life: 1.0, decay: Math.random() * 0.03 + 0.02, color: colorStr, size: Math.random() * 5 + 2
            });
        }
    }
    
    loop = () => {
        this.ctx.clearRect(0, 0, this.width, this.height);
        for(let i=this.particles.length-1; i>=0; i--) {
            let p = this.particles[i];
            p.x += p.vx; p.y += p.vy; p.vy += 0.2; 
            p.life -= p.decay;
            if(p.life <= 0) { this.particles.splice(i, 1); continue; }
            this.ctx.globalAlpha = p.life;
            this.ctx.fillStyle = p.color;
            this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); this.ctx.fill();
        }
        this.ctx.globalAlpha = 1.0;
        this.animationId = requestAnimationFrame(this.loop);
    }
}

const FloatingMessage = ({ message, onComplete }) => {
    useEffect(() => {
        const timer = setTimeout(onComplete, 1500);
        return () => clearTimeout(timer);
    }, [onComplete]);

    return (
        <div 
            className="absolute z-50 animate-float font-black text-xl px-3 py-1 rounded-xl border-2 shadow-2xl flex flex-col items-center justify-center whitespace-nowrap bg-slate-800 text-emerald-400 border-emerald-500 pointer-events-none"
            style={{ left: message.x, top: message.y, transform: 'translate(-50%, -50%)' }}
        >
            <span dangerouslySetInnerHTML={{ __html: message.text }}></span>
            {message.bonus && <span className="text-yellow-400 text-xs mt-0.5">+{message.bonus}점</span>}
        </div>
    );
};

// ==========================================
// 메인 게임 엔진 (진짜 벌집 Hexagon 배열 적용)
// ==========================================
const HexaConnectGame = ({ mode, onEnd }) => {
    const GRID_SIZE = 6;
    const TOTAL_CELLS = GRID_SIZE * GRID_SIZE;
    
    const [grid, setGrid] = useState([]);
    const [path, setPath] = useState([]);
    const [lines, setLines] = useState([]); 
    const [score, setScore] = useState(0);
    const [combo, setCombo] = useState(0);
    const [messages, setMessages] = useState([]);
    
    const [timeLeft, setTimeLeft] = useState(mode === 'time' ? 60 : (mode === 'mission' ? 90 : 0));
    const [missionTarget, setMissionTarget] = useState(null);
    const [bountyTarget, setBountyTarget] = useState(null); 
    const [pushTimer, setPushTimer] = useState(mode === 'survival' ? 6.0 : 4.0);
    const [survivedTime, setSurvivedTime] = useState(0);
    
    const [forceRender, setForceRender] = useState(0);

    const pushIntervalRef = useRef(mode === 'survival' ? 6.0 : 4.0);
    const comboTimerRef = useRef(0);
    const canvasRef = useRef(null);
    const engineRef = useRef(null);
    const boardRef = useRef(null);
    const cellBoundsRef = useRef([]); 
    const isGameOverRef = useRef(false);

    const getRandomAtom = () => ATOM_POOL[Math.floor(Math.random() * ATOM_POOL.length)];
    const getRandomMission = () => MOLECULES[Math.floor(Math.random() * MOLECULES.length)];

    useEffect(() => {
        const preventTouchScroll = (e) => { e.preventDefault(); };
        const boardEl = boardRef.current;
        if (boardEl) boardEl.addEventListener('touchmove', preventTouchScroll, { passive: false });
        return () => { if (boardEl) boardEl.removeEventListener('touchmove', preventTouchScroll); }
    }, []);

    const updateCellBounds = useCallback(() => {
        if (!boardRef.current) return;
        const rect = boardRef.current.getBoundingClientRect();
        
        const padding = 12; 
        const gap = 8;
        
        const availableWidth = rect.width - (padding * 2);
        const cellW = (availableWidth - 5 * gap) / 6.5; 
        const cellH = cellW;
        
        const bounds = [];
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const xOffset = (r % 2 === 1) ? (cellW + gap) / 2 : 0;
                const left = padding + c * (cellW + gap) + xOffset;
                const top = padding + r * (cellH + gap) * 0.88; 
                
                const cx = left + cellW / 2;
                const cy = top + cellH / 2;
                
                bounds.push({ idx: r * GRID_SIZE + c, cx, cy, r: cellW / 2, left, top, w: cellW, h: cellH });
            }
        }
        cellBoundsRef.current = bounds;
        
        const totalH = padding * 2 + (GRID_SIZE - 1) * (cellH + gap) * 0.88 + cellH;
        boardRef.current.style.height = `${totalH}px`;
        
        setForceRender(prev => prev + 1);
    }, []);

    useEffect(() => {
        updateCellBounds();
        const timerId = setTimeout(updateCellBounds, 100); 
        window.addEventListener('resize', updateCellBounds);
        return () => {
            clearTimeout(timerId);
            window.removeEventListener('resize', updateCellBounds);
        };
    }, [updateCellBounds, grid]); 

    useEffect(() => {
        if (!boardRef.current || path.length === 0 || cellBoundsRef.current.length === 0) {
            setLines([]);
            return;
        }
        const newLines = path.map(idx => {
            const cell = cellBoundsRef.current[idx];
            return { x: cell.cx, y: cell.cy }; 
        });
        setLines(newLines);
    }, [path, forceRender]);

    useEffect(() => {
        let initial = [];
        if (mode === 'survival') {
            for(let i=0; i<TOTAL_CELLS; i++) initial.push(i >= TOTAL_CELLS - GRID_SIZE ? { id: Math.random(), sym: getRandomAtom() } : null);
        } else {
            for(let i=0; i<TOTAL_CELLS; i++) initial.push({ id: Math.random(), sym: getRandomAtom() });
        }
        setGrid(initial);
        if (mode === 'mission') setMissionTarget(getRandomMission());

        if(canvasRef.current) {
            engineRef.current = new ParticleEngine(canvasRef.current);
            engineRef.current.resize(); engineRef.current.start();
            
            const ro = new ResizeObserver(()=> { if(engineRef.current) engineRef.current.resize(); });
            if(canvasRef.current.parentNode) ro.observe(canvasRef.current.parentNode);
            return () => { if(engineRef.current) engineRef.current.stop(); ro.disconnect(); };
        }
    }, [mode]);

    useEffect(() => {
        if (mode === 'mission' || isGameOverRef.current) return;
        setBountyTarget(getRandomMission()); 
        const bountyInterval = setInterval(() => {
            if (!isGameOverRef.current) setBountyTarget(getRandomMission());
        }, 15000);
        return () => clearInterval(bountyInterval);
    }, [mode]);

    useEffect(() => {
        if (isGameOverRef.current) return;
        const interval = setInterval(() => {
            if (comboTimerRef.current > 0) {
                comboTimerRef.current -= 0.1;
                if (comboTimerRef.current <= 0) setCombo(0);
            }

            if (mode === 'time' || mode === 'mission') {
                setTimeLeft(prev => {
                    if(prev <= 0.1) {
                        isGameOverRef.current = true;
                        clearInterval(interval);
                        setTimeout(() => onEnd(score), 300); 
                        return 0;
                    }
                    return prev - 0.1;
                });
            } else if (mode === 'survival') {
                setSurvivedTime(prev => prev + 0.1);
                setPushTimer(prev => {
                    if (prev <= 0.1) {
                        triggerSurvivalPush();
                        pushIntervalRef.current = Math.max(2.0, pushIntervalRef.current - 0.05);
                        return pushIntervalRef.current;
                    }
                    return prev - 0.1;
                });
            }
        }, 100);
        return () => clearInterval(interval);
    }, [mode, score, onEnd]);

    const triggerSurvivalPush = useCallback(() => {
        setGrid(prev => {
            let overflow = false;
            for(let c=0; c<GRID_SIZE; c++) if(prev[c] !== null) overflow = true;
            if (overflow) {
                isGameOverRef.current = true;
                setTimeout(() => onEnd(score), 100);
                return prev;
            }
            let next = [...prev];
            for(let r=0; r<GRID_SIZE-1; r++) {
               for(let c=0; c<GRID_SIZE; c++) next[r*GRID_SIZE+c] = next[(r+1)*GRID_SIZE+c];
            }
            for(let c=0; c<GRID_SIZE; c++) next[(GRID_SIZE-1)*GRID_SIZE+c] = { id: Math.random(), sym: getRandomAtom() };
            return next;
        });
    }, [score, onEnd]);

    const isAdjacent = (idx1, idx2) => {
        if (idx1 === null || idx2 === null) return false;
        const r1 = Math.floor(idx1 / GRID_SIZE), c1 = idx1 % GRID_SIZE;
        const r2 = Math.floor(idx2 / GRID_SIZE), c2 = idx2 % GRID_SIZE;
        
        if (r1 === r2) return Math.abs(c1 - c2) === 1;
        if (Math.abs(r1 - r2) === 1) {
            if (r1 % 2 === 0) return c2 === c1 || c2 === c1 - 1;
            else return c2 === c1 || c2 === c1 + 1;
        }
        return false;
    };

    const getIndexFromPointer = (clientX, clientY) => {
        if (!boardRef.current) return null;
        const rect = boardRef.current.getBoundingClientRect();
        
        let closestIdx = null;
        let minDist = Infinity;
        
        for (let i = 0; i < cellBoundsRef.current.length; i++) {
            const cell = cellBoundsRef.current[i];
            const absCx = rect.left + cell.cx;
            const absCy = rect.top + cell.cy;
            const dist = Math.hypot(clientX - absCx, clientY - absCy);
            
            if (dist < cell.r * 1.3 && dist < minDist) {
                minDist = dist;
                closestIdx = cell.idx;
            }
        }
        return closestIdx;
    };

    const handlePointerDown = (e) => {
        if (isGameOverRef.current) return;
        if(e.target.hasPointerCapture(e.pointerId)) e.target.releasePointerCapture(e.pointerId);
        
        const idx = getIndexFromPointer(e.clientX, e.clientY);
        if (idx !== null && grid[idx]) {
            setPath([idx]);
            if (navigator.vibrate) navigator.vibrate(15);
        }
    };
    
    const handlePointerMove = (e) => {
        if (path.length === 0 || isGameOverRef.current) return;
        
        const idx = getIndexFromPointer(e.clientX, e.clientY);
        if (idx !== null && grid[idx]) {
            const lastIdx = path[path.length - 1];
            if (path.length > 1 && path[path.length - 2] === idx) {
                setPath(prev => prev.slice(0, -1)); 
                if (navigator.vibrate) navigator.vibrate(15);
            } else if (!path.includes(idx) && isAdjacent(lastIdx, idx)) {
                setPath(prev => [...prev, idx]);
                if (navigator.vibrate) navigator.vibrate(15);
            }
        }
    };

    const handlePointerUp = () => {
        if (path.length === 0 || isGameOverRef.current) return;
        
        const counts = {};
        path.forEach(idx => { 
            if(grid[idx]) counts[grid[idx].sym] = (counts[grid[idx].sym] || 0) + 1; 
        });
        
        let matchedMol = null;
        for (let mol of MOLECULES) {
            const k1 = Object.keys(counts), k2 = Object.keys(mol.formula);
            if (k1.length !== k2.length) continue;
            let match = true;
            for (let k of k1) { if (counts[k] !== mol.formula[k]) { match = false; break; } }
            if (match) { matchedMol = mol; break; }
        }

        if (matchedMol) {
            const lastIdx = path[path.length - 1];
            let px = 0, py = 0;
            
            if(cellBoundsRef.current[lastIdx]) {
                const cell = cellBoundsRef.current[lastIdx];
                px = cell.cx;
                py = cell.cy;
            }
            
            if (navigator.vibrate) navigator.vibrate(50); // 성공 진동

            const atomCount = Object.values(matchedMol.formula).reduce((a,b)=>a+b,0);
            
            let isMissionSuccess = (mode === 'mission' && matchedMol.id === missionTarget?.id);
            let isBountySuccess = (mode !== 'mission' && matchedMol.id === bountyTarget?.id);

            let triggerBomb = mode === 'survival' && (isBountySuccess || atomCount >= 4);

            let multiplier = 1 + (combo * 0.15); 
            if (isMissionSuccess) multiplier *= 2.0; 
            if (isBountySuccess) multiplier *= 3.0;  

            if (engineRef.current) {
                const color = isBountySuccess ? '#fbbf24' : (ATOM_INFO[grid[lastIdx].sym]?.color || '#10b981');
                engineRef.current.explode(px, py, color, isBountySuccess ? 50 : 35);
                
                if (triggerBomb) {
                    let newGridMock = [...grid];
                    path.forEach(idx => newGridMock[idx] = null);
                    let highestRow = -1;
                    for (let r = 0; r < GRID_SIZE; r++) {
                        for (let c = 0; c < GRID_SIZE; c++) {
                            if (newGridMock[r * GRID_SIZE + c] !== null) { highestRow = r; break; }
                        }
                        if (highestRow !== -1) break;
                    }
                    if (highestRow !== -1 && boardRef.current) {
                        for (let c = 0; c < GRID_SIZE; c++) {
                            let targetIdx = highestRow * GRID_SIZE + c;
                            if (newGridMock[targetIdx]) {
                                const bCell = cellBoundsRef.current[targetIdx];
                                if (bCell) {
                                    engineRef.current.explode(bCell.cx, bCell.cy, '#ef4444', 20);
                                }
                            }
                        }
                    }
                }
            }

            const earnedPts = Math.round((atomCount * 60) * multiplier);
            setScore(s => s + earnedPts);
            
            setCombo(c => Math.min(c + 1, 10));
            comboTimerRef.current = 5.0;

            if (isMissionSuccess) {
                setTimeLeft(t => Math.min(120, t + 6));
                setMissionTarget(getRandomMission());
            }

            if (isBountySuccess) {
                setBountyTarget(getRandomMission()); 
            }

            let msgText = isBountySuccess ? `🔥 <span class="text-amber-400">현상금 헌터!</span><br/>${matchedMol.name}` : matchedMol.name;
            if (triggerBomb) msgText += `<br/><span class="text-red-400 text-sm">💣 라인 클리어!</span>`;

            setMessages(prev => [...prev, { id: Date.now(), text: msgText, bonus: earnedPts, x: px, y: py }]);

            setGrid(prevGrid => {
                let newGrid = [...prevGrid];
                path.forEach(idx => newGrid[idx] = null);
                
                if (triggerBomb) {
                    let highestRow = -1;
                    for (let r = 0; r < GRID_SIZE; r++) {
                        for (let c = 0; c < GRID_SIZE; c++) {
                            if (newGrid[r * GRID_SIZE + c] !== null) { highestRow = r; break; }
                        }
                        if (highestRow !== -1) break;
                    }
                    if (highestRow !== -1) {
                        for (let c = 0; c < GRID_SIZE; c++) {
                            newGrid[highestRow * GRID_SIZE + c] = null;
                        }
                    }
                }
                
                for (let c = 0; c < GRID_SIZE; c++) {
                    let column = [];
                    for (let r = 0; r < GRID_SIZE; r++) {
                        if (newGrid[r * GRID_SIZE + c] !== null) column.push(newGrid[r * GRID_SIZE + c]);
                    }
                    if (mode !== 'survival') {
                        while (column.length < GRID_SIZE) column.unshift({ id: Math.random(), sym: getRandomAtom() });
                    } else {
                        while (column.length < GRID_SIZE) column.unshift(null);
                    }
                    for (let r = 0; r < GRID_SIZE; r++) newGrid[r * GRID_SIZE + c] = column[r];
                }
                return newGrid;
            });
        }
        setPath([]);
    };

    return (
        <div className="flex flex-col h-full bg-slate-900 w-full" style={{ touchAction: 'none' }}>
            <div className="pt-[max(12px,var(--safe-top))] px-4 py-3 bg-slate-800 border-b border-slate-700 flex flex-col gap-2 relative z-20">
                <div className="flex justify-between items-start">
                    <div>
                        <div className="text-2xl font-black text-blue-400 leading-none">{score} <span className="text-sm font-bold">PTS</span></div>
                        {combo > 0 && <div className="text-emerald-400 font-bold text-sm mt-1.5 animate-pulse-fast">{combo} COMBO! (x{(1+combo*0.15).toFixed(2)})</div>}
                    </div>
                    
                    <div className="flex flex-col items-end gap-1.5">
                        <button 
                            onClick={() => { isGameOverRef.current = true; onEnd(score); }} 
                            className="bg-red-500/20 text-red-400 hover:bg-red-500/40 border border-red-500/30 px-3 py-1 rounded-lg text-xs font-bold active:scale-95 transition-transform"
                        >
                            🛑 포기
                        </button>
                        {mode === 'survival' ? (
                            <div className="text-right">
                                <div className="text-xl font-black text-red-400 leading-none">☠️ {Math.floor(survivedTime)}s</div>
                                <div className="w-24 h-1.5 bg-slate-700 rounded-full mt-1.5 overflow-hidden border border-slate-600">
                                    <div className="h-full bg-red-500 transition-all duration-100" style={{ width: `${(pushTimer / pushIntervalRef.current) * 100}%` }}></div>
                                </div>
                            </div>
                        ) : mode === 'zen' ? (
                            <div className="text-emerald-400 font-bold text-sm bg-emerald-500/10 px-2 py-0.5 rounded border border-emerald-500/20">🧘 무한 탐구</div>
                        ) : (
                            <div className="text-2xl font-black text-red-400 leading-none">⏱ {Math.ceil(timeLeft)}s</div>
                        )}
                    </div>
                </div>
                
                {mode === 'mission' && missionTarget && (
                    <div className="bg-slate-900 border border-emerald-500/40 rounded-lg p-2.5 flex justify-between items-center shadow-lg shadow-emerald-500/10 animate-slidedown">
                        <span className="text-emerald-400 text-xs font-bold animate-pulse">🎯 조립 주문서 (+6초)</span>
                        <div className="flex items-center gap-2">
                            <span className="font-bold text-lg text-white" dangerouslySetInnerHTML={{__html: missionTarget.formulaHtml}}></span>
                            <span className="text-slate-400 text-xs">({missionTarget.name})</span>
                        </div>
                    </div>
                )}

                {/* 현상금(Bounty) 배너 */}
                {mode !== 'mission' && bountyTarget && (
                    <div className="bg-slate-900 border border-amber-500/50 rounded-lg p-2 flex justify-between items-center shadow-[0_0_10px_rgba(251,191,36,0.2)] animate-slidedown">
                        <span className="text-amber-400 text-xs font-bold animate-pulse px-2">✨ 추천 조립 (점수 3배)</span>
                        <div className="flex items-center gap-2 pr-2">
                            <span className="font-bold text-lg text-white" dangerouslySetInnerHTML={{__html: bountyTarget.formulaHtml}}></span>
                            <span className="text-slate-400 text-xs">({bountyTarget.name})</span>
                        </div>
                    </div>
                )}
            </div>
            
            <div className="flex-1 flex flex-col items-center justify-center p-4 relative overflow-hidden touch-none">
                
                <div className="text-slate-400 mb-4 text-center text-xs absolute top-4">
                    {mode === 'survival' 
                        ? '💥 4원자 이상 완성 또는 현상금 달성 시 맨 윗줄이 폭파됩니다!' 
                        : mode === 'zen' 
                            ? '편안하게 여러 분자를 자유롭게 조합하세요.'
                            : '드래그로 원소를 묶어 완벽한 분자식을 조립하세요.'}
                </div>
                
                {/* 게임 보드 컨테이너: 이벤트 통합 제어 */}
                <div 
                    ref={boardRef} 
                    className="relative w-full max-w-[360px] bg-slate-800/90 rounded-2xl shadow-2xl border border-slate-700 touch-none"
                    style={{ minHeight: '320px' }} // 초기화 전 높이 유지용
                    onPointerDown={handlePointerDown}
                    onPointerMove={handlePointerMove}
                    onPointerUp={handlePointerUp}
                    onPointerCancel={handlePointerUp}
                    onPointerLeave={handlePointerUp}
                >
                    <canvas ref={canvasRef} className="absolute inset-0 w-full h-full pointer-events-none z-10" />
                    
                    {/* 연결선 시각화 (SVG Polyline) */}
                    <svg className="absolute inset-0 w-full h-full pointer-events-none z-15 overflow-visible">
                        {lines.length > 1 && (
                            <polyline 
                                points={lines.map(p => `${p.x},${p.y}`).join(' ')} 
                                fill="none" 
                                stroke="#10b981" 
                                strokeWidth="8" 
                                strokeLinecap="round" 
                                strokeLinejoin="round" 
                                opacity="0.6"
                            />
                        )}
                    </svg>
                    
                    {/* 벌집 배열 셀 렌더링 */}
                    {grid.map((cell, idx) => {
                        const isSelected = path.includes(idx);
                        const safeColor = cell && ATOM_INFO[cell.sym] ? ATOM_INFO[cell.sym].color : 'transparent';
                        const safeText = cell && ATOM_INFO[cell.sym] ? ATOM_INFO[cell.sym].text : 'transparent';
                        const bounds = cellBoundsRef.current[idx];
                        
                        return bounds ? (
                            <div 
                                key={cell?.id || idx} 
                                data-index={idx}
                                className={`absolute rounded-full flex items-center justify-center font-black text-lg transition-all duration-75 select-none pointer-events-none
                                    ${isSelected ? 'scale-90 ring-4 ring-emerald-400 z-20 shadow-[0_0_15px_rgba(52,211,100,0.6)]' : ''}
                                    ${cell ? 'shadow-md border-b-4 border-black/30' : 'opacity-10'}`}
                                style={{ 
                                    left: bounds.left, top: bounds.top, width: bounds.w, height: bounds.h,
                                    backgroundColor: safeColor, color: safeText 
                                }}
                            >
                                {cell?.sym}
                            </div>
                        ) : null;
                    })}
                    
                    {messages.map(msg => (
                        <FloatingMessage key={msg.id} message={msg} onComplete={() => setMessages(m => m.filter(x => x.id !== msg.id))} />
                    ))}
                </div>
                
                <div className="absolute bottom-6 w-full max-w-[360px] px-4">
                     <div className="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                         <div className="h-full bg-emerald-400 transition-all duration-100" style={{width: `${(comboTimerRef.current / 5.0) * 100}%`}}></div>
                     </div>
                </div>
            </div>
        </div>
    );
};

const Leaderboard = ({ leaders, isLoading, errorMsg, onRefresh }) => {
    const [selectedTab, setSelectedTab] = useState('타임어택'); 
    const [schoolFilter, setSchoolFilter] = useState('전체');

    const uniqueSchools = useMemo(() => {
        return ['전체', ...new Set(leaders.map(l => l.schoolName).filter(Boolean))].sort();
    }, [leaders]);

    // 필터 조건 업데이트: 상위 15등 표시
    const filteredLeaders = useMemo(() => {
        return leaders
            .filter(l => l.mode === selectedTab && (schoolFilter === '전체' || l.schoolName === schoolFilter))
            .sort((a, b) => b.score - a.score)
            .slice(0, 15);
    }, [leaders, selectedTab, schoolFilter]);

    return (
        <div className="glass-panel rounded-2xl p-4 w-full max-w-md mx-auto mb-6 relative">

                {/* 랭킹 학교별 필터링 드롭다운 */}
                <div className="w-1/4">
                    <select 
                        value={schoolFilter} 
                        onChange={(e) => setSchoolFilter(e.target.value)}
                        className="w-full bg-slate-800 text-[10px] text-amber-400 border border-slate-700 rounded p-1.5 outline-none truncate"
                    >
                        {uniqueSchools.map(s => <option key={s} value={s}>{s === '전체' ? '전체 학교' : s}</option>)}
                    </select>
                </div>
                
                <h3 className="text-md font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-400 flex items-center gap-1.5 whitespace-nowrap">
                    👑 명예의 전당 Top 15
                </h3>
                
                <div className="w-1/4 flex justify-end">
                    <button onClick={onRefresh} className="text-slate-400 hover:text-white transition text-lg active:scale-95" title="새로고침">
                        🔄
                    </button>
                </div>
            </div>
            
            <div className="flex bg-slate-900/60 p-1 rounded-xl mb-3 border border-slate-800 gap-1">
                {['타임어택', '오더미션', '서바이벌'].map(tab => (

                        {tab}

            {isLoading ? (
                <div className="flex flex-col items-center justify-center py-8 text-slate-400">
                    <div className="w-6 h-6 border-2 border-amber-400 border-t-transparent rounded-full animate-spin-slow mb-2"></div>
                    <span className="text-xs">데이터 로딩 중...</span>

            ) : errorMsg ? (
                <div className="text-center text-red-400 text-xs py-4">{errorMsg}</div>
            ) : filteredLeaders.length === 0 ? (
                <div className="text-center text-slate-400 text-xs py-4 leading-relaxed">아직 등록된 기록이 없습니다.<br/>지금 가장 먼저 기록을 세워보세요!</div>
            ) : (
                <div className="space-y-1.5 max-h-[250px] overflow-y-auto scrollable-panel">
                    {filteredLeaders.map((l, i) => (
                        <div key={i} className={`flex justify-between items-center p-2 rounded-lg text-xs ${i===0?'bg-yellow-500/15 border border-yellow-500/30': i===1?'bg-slate-300/10': i===2?'bg-orange-700/20':'bg-slate-800/40'}`}>
                            <div className="flex items-center gap-2">
                                <span className={`font-black w-5 text-center ${i===0?'text-yellow-400':i===1?'text-slate-300':i===2?'text-orange-400':'text-slate-500'}`}>{i+1}</span>

                                    </span>

                            <span className="font-black text-amber-400">{l.score.toLocaleString()}</span>
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
};

        return [...MOLECULES].map(mol => {
            const atomCount = Object.values(mol.formula).reduce((a, b) => a + b, 0);
            return { ...mol, baseScore: atomCount * 60, atomCount };
        }).sort((a, b) => b.baseScore - a.baseScore);
    }, []);

    return (
        <Modal isOpen={isOpen} onClose={onClose} title="📘 분자 조립 도감 (레시피)">
            <p className="text-xs text-slate-400 mb-4 bg-slate-900/50 p-2 rounded text-center">
                어려운 분자를 연결할수록 획득 점수가 크게 증가합니다!<br/>
                <span className="text-amber-400 font-bold">※ 게임 중 현상금이 걸린 분자는 점수 3배 적용!</span>
            </p>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 pb-2">
                {sortedMolecules.map(mol => (
                    <div key={mol.id} className="bg-slate-800/80 border border-slate-700 rounded-xl p-3 flex flex-col justify-between hover:bg-slate-700/80 transition">
                        <div className="flex justify-between items-start mb-2">
                            <div>
                                <div className="text-lg font-black text-white" dangerouslySetInnerHTML={{__html: mol.formulaHtml}}></div>
                                <div className="text-xs text-slate-400">{mol.name}</div>
                            </div>
                            <div className="text-amber-400 font-bold text-sm bg-amber-500/10 px-2 py-0.5 rounded border border-amber-500/20">
                                {mol.baseScore}점
                            </div>
                        </div>
                        <div className="flex gap-1 flex-wrap">
                            {Object.entries(mol.formula).map(([atom, count]) => (
                                <span key={atom} className="text-[10px] px-1.5 py-0.5 bg-slate-900 text-slate-300 border border-slate-600 rounded flex items-center">

                    </div>
                ))}
            </div>
        </Modal>
    );
};

                    <div><h3 className="text-sm font-bold text-white">무한 탐구 (연습 모드)</h3><p className="text-[11px] text-slate-400 mt-0.5">게임오버 걱정 없이 분자 합성을 자율 관찰하세요!</p></div>

            <div className="mt-8 text-slate-500 font-mono text-[10px]">Created by Yang DH</div>

const ResultView = ({ gameData, onSubmit, uniqueSchools }) => {
    // 자동 기억 (로컬 스토리지 데이터 로드)
    const [formData, setFormData] = useState({ 
        schoolName: localStorage.getItem('hz_school') || '',
        studentId: localStorage.getItem('hz_stdId') || '', 
        studentName: localStorage.getItem('hz_name') || '' 
    });
    const [showError, setShowError] = useState('');
    const [isSubmitting, setIsSubmitting] = useState(false);

    const handleLeaderboardSubmit = async () => {
        if (!formData.schoolName || !formData.studentId || !formData.studentName) { 
            setShowError('학교, 학번, 이름을 모두 입력해주세요.'); 
            return; 
        }
        if (!GOOGLE_SCRIPT_URL) { setShowError('구글 시트 연동 URL이 설정되지 않았습니다.'); return; }
        
        setIsSubmitting(true);
        const modeStr = gameData.mode === 'time' ? '타임어택' : (gameData.mode === 'mission' ? '오더미션' : '서바이벌');

        // 입력 데이터 스마트폰에 자동 저장
        localStorage.setItem('hz_school', formData.schoolName.trim());
        localStorage.setItem('hz_stdId', formData.studentId.trim());
        localStorage.setItem('hz_name', formData.studentName.trim());

        const payload = {
            type: '점수',
            timestamp: new Date().toLocaleString(),
            schoolName: formData.schoolName.trim(),
            studentId: formData.studentId.trim(),
            studentName: formData.studentName.trim(),
            mode: modeStr,
            score: gameData.score
        };

        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            onSubmit(); 
        } catch (err) {
            console.error("Sheet submit error", err);
            setShowError("서버 전송 중 오류가 발생했습니다.");
            setIsSubmitting(false);
        }
    };

    return (
        <div className="flex flex-col h-full h-screen-safe bg-slate-900 justify-center p-6 text-center">
            <div className="max-w-md w-full mx-auto space-y-6 animate-pop">
                <div className="text-5xl">🏆</div>
                <div>
                    <h2 className="text-3xl font-black text-white">게임 종료!</h2>
                    <p className="text-slate-400 text-sm mt-1">점수를 자랑스럽게 기입하세요!</p>
                </div>

                <div className="bg-slate-800 rounded-3xl p-6 border border-slate-700 shadow-xl space-y-4">
                    <div>
                        <div className="text-xs text-slate-400 mb-0.5">최종 점수</div>
                        <div className="text-4xl font-black text-amber-400">{gameData.score.toLocaleString()} <span className="text-lg">점</span></div>
                    </div>

                    {gameData.mode !== 'zen' ? (
                        <div className="space-y-3 pt-2 text-left">
                            <div className="grid grid-cols-3 gap-2">
                                <div className="col-span-3">
                                    <input 
                                        list="school-list" 
                                        type="text" 
                                        placeholder="학교명 (선택 또는 입력)" 
                                        className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white text-sm outline-none focus:border-amber-500" 
                                        value={formData.schoolName} 
                                        onChange={e => setFormData({...formData, schoolName: e.target.value})} 
                                    />
                                    {/* 기존 시트 데이터 기반 자동완성 목록 */}
                                    <datalist id="school-list">
                                        {uniqueSchools.map(s => <option key={s} value={s} />)}
                                    </datalist>
                                </div>
                                <div className="col-span-1">
                                    <input 
                                        type="text" 
                                        placeholder="학번" 
                                        className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white text-sm outline-none focus:border-amber-500" 
                                        value={formData.studentId} 
                                        onChange={e => setFormData({...formData, studentId: e.target.value})} 
                                    />
                                </div>
                                <div className="col-span-2">
                                    <input 
                                        type="text" 
                                        placeholder="이름" 
                                        className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white text-sm outline-none focus:border-amber-500" 
                                        value={formData.studentName} 
                                        onChange={e => setFormData({...formData, studentName: e.target.value})} 
                                    />
                                </div>
                            </div>
                            <Button onClick={handleLeaderboardSubmit} className="w-full py-3.5 text-md" disabled={isSubmitting}>{isSubmitting ? '등록 중...' : '🏆 명예의 전당 기록 등록하기'}</Button>
                        </div>
                    ) : (
                        <div className="bg-slate-900/60 p-4 rounded-xl text-xs text-slate-400 leading-relaxed">
                            💡 무한 탐구(연습 모드)는 명예의 전당 등록이 불가합니다.
                        </div>
                    )}
                </div>
                <button onClick={onSubmit} className="text-slate-400 hover:text-white font-bold text-sm underline active:scale-95 transition-transform block mx-auto">등록 없이 메인으로 나가기</button>
            </div>
            <Modal isOpen={!!showError} onClose={()=>setShowError('')} title="오류 알림"><p>{showError}</p></Modal>
        </div>
    );
};

const FinalReportView = ({ onBack }) => {
    const [answers, setAnswers] = useState({});
    const [formData, setFormData] = useState({ 
        schoolName: localStorage.getItem('hz_school') || '',
        studentId: localStorage.getItem('hz_stdId') || '', 
        studentName: localStorage.getItem('hz_name') || '', 
        insight: '' 
    });
    const [showError, setShowError] = useState('');
    const [isSubmitting, setIsSubmitting] = useState(false);
    const [quizQuestions, setQuizQuestions] = useState([]);

    useEffect(() => setQuizQuestions([...QUIZ_POOL].sort(() => 0.5 - Math.random()).slice(0, 3)), []);

    const handleReportSubmit = async () => {
        if (!formData.schoolName || !formData.studentId || !formData.studentName || !formData.insight) { 
            setShowError('학교, 학번, 이름, 성찰 내용을 모두 입력하세요.'); 
            return; 
        }
        if (Object.keys(answers).length < 3) { setShowError('퀴즈 3문항을 모두 제출하세요.'); return; }
        if (!GOOGLE_SCRIPT_URL) { setShowError('구글 시트 연동 URL이 설정되지 않았습니다.'); return; }
        
        setIsSubmitting(true);
        let quizScore = Math.round(Object.keys(answers).reduce((acc, i) => acc + (answers[i] === quizQuestions[i].a ? 33.3 : 0), 0));

        // 입력 데이터 자동 저장
        localStorage.setItem('hz_school', formData.schoolName.trim());
        localStorage.setItem('hz_stdId', formData.studentId.trim());
        localStorage.setItem('hz_name', formData.studentName.trim());

        const payload = { 
            type: '보고서',
            timestamp: new Date().toLocaleString(), 
            schoolName: formData.schoolName.trim(),
            studentId: formData.studentId.trim(),
            studentName: formData.studentName.trim(),
            quizScore, 
            insight: formData.insight 
        };

        try {
            await fetch(GOOGLE_SCRIPT_URL, { 
                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify(payload)
            });
            onBack();
        } catch (error) {
            setShowError('제출 실패. 네트워크 오류입니다.');
            setIsSubmitting(false);
        }
    };

    return (
        <div className="flex flex-col h-full h-screen-safe bg-slate-900 scrollable-panel pt-[max(16px,var(--safe-top))] pb-[max(16px,var(--safe-bottom))] px-4">
            <div className="max-w-md w-full mx-auto space-y-5">
                <div className="flex justify-between items-center">
                    <button onClick={onBack} className="text-slate-400 hover:text-white font-bold text-sm">← 메인 화면</button>
                    <h2 className="text-xl font-black text-white">📝 수업 최종 보고서</h2>
                    <div className="w-10"></div>
                </div>

                <div className="glass-panel rounded-2xl p-4 grid grid-cols-4 gap-2">
                    <div className="col-span-4">
                        <input type="text" placeholder="학교명 (예: 한국중)" className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white text-sm outline-none focus:border-emerald-500" value={formData.schoolName} onChange={e => setFormData({...formData, schoolName: e.target.value})} />
                    </div>
                    <div className="col-span-2">
                        <input type="text" placeholder="학번" className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white text-sm outline-none focus:border-emerald-500" value={formData.studentId} onChange={e => setFormData({...formData, studentId: e.target.value})} />
                    </div>
                    <div className="col-span-2">
                        <input type="text" placeholder="이름" className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white text-sm outline-none focus:border-emerald-500" value={formData.studentName} onChange={e => setFormData({...formData, studentName: e.target.value})} />
                    </div>
                </div>

                <div className="space-y-3">
                    <h3 className="font-bold text-emerald-400 text-sm">🔬 미니 확인 테스트</h3>
                    {quizQuestions.map((q, i) => (
                        <div key={i} className="glass-panel rounded-xl p-4">
                            <p className="text-slate-200 text-xs leading-relaxed mb-3">Q{i+1}. {q.q}</p>
                            <div className="flex gap-2">
                                <button onClick={() => answers[i]===undefined && setAnswers({...answers, [i]:true})} className={`flex-1 py-1.5 rounded-lg text-sm font-bold transition-all ${answers[i]===true?'bg-emerald-600 text-white scale-105':'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}>O</button>
                                <button onClick={() => answers[i]===undefined && setAnswers({...answers, [i]:false})} className={`flex-1 py-1.5 rounded-lg text-sm font-bold transition-all ${answers[i]===false?'bg-red-600 text-white scale-105':'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}>X</button>
                            </div>
                            {answers[i]!==undefined && (
                                <div className={`text-[11px] mt-2.5 p-2 rounded-lg ${answers[i]===q.a?'bg-emerald-500/10 text-emerald-300':'bg-red-500/10 text-red-300'}`}>
                                    <span className="font-bold">{answers[i]===q.a?'정답! ':'오답! '}</span>{q.explain}
                                </div>
                            )}
                        </div>
                    ))}
                </div>

                <div className="glass-panel rounded-xl p-4">
                    <label className="block text-xs font-bold text-emerald-400 mb-1.5">💡 수업 정리 및 성찰 작성</label>
                    <textarea className="w-full h-24 bg-slate-900 border border-slate-700 rounded-lg p-3 text-xs text-white resize-none outline-none focus:border-emerald-500 leading-relaxed" placeholder="새롭게 배운 지식이나 과학적 성찰을 기입하세요." value={formData.insight} onChange={e => setFormData({...formData, insight: e.target.value})}></textarea>
                </div>
                <Button onClick={handleReportSubmit} className="w-full py-4 text-md" variant="emerald" disabled={isSubmitting}>{isSubmitting ? '서버 전송 중...' : '✔️ 최종 제출하기 (구글 시트)'}</Button>
            </div>
            <Modal isOpen={!!showError} onClose={()=>setShowError('')} title="알림"><p>{showError}</p></Modal>
        </div>
    );
};

const AdminGuideModal = ({ isOpen, onClose }) => {
    const [copied, setCopied] = useState(false);
    if(!isOpen) return null;
    
    // [중요 업데이트] '학교' 열이 추가된 Apps Script
    const code = `function doGet(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  if (sheet.getLastRow() === 0) return ContentService.createTextOutput("[]").setMimeType(ContentService.MimeType.JSON);
  
  var data = sheet.getDataRange().getValues();
  var headers = data[0];
  var result = [];
  for (var i = 1; i < data.length; i++) {
    var obj = {};
    for (var j = 0; j < headers.length; j++) {
      obj[headers[j]] = data[i][j];
    }
    result.push(obj);
  }
  return ContentService.createTextOutput(JSON.stringify(result)).setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  if (sheet.getLastRow() === 0) {
    sheet.appendRow(['유형', '제출시간', '학교', '학번', '이름', '모드', '점수', '퀴즈점수', '알게된점']);
    sheet.getRange(1, 1, 1, sheet.getLastColumn()).setFontWeight('bold').setBackground('#4a86e8').setFontColor('#ffffff');
  }
  var data = JSON.parse(e.postData.contents);
  sheet.appendRow([
    data.type || '점수',
    data.timestamp || '',
    data.schoolName || '',
    data.studentId || '',
    data.studentName || '',
    data.mode || '',
    data.score || 0,
    data.quizScore || 0,
    data.insight || ''
  ]);
  return ContentService.createTextOutput(JSON.stringify({ result: 'success' })).setMimeType(ContentService.MimeType.JSON);
}`;

    const handleCopy = () => {
        try {
            const ta = document.createElement('textarea'); ta.value = code; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            setCopied(true); setTimeout(() => setCopied(false), 2000);
        } catch (err) {}
    };

    return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
            <div className="bg-slate-800 rounded-2xl p-5 w-full max-w-md max-h-[90dvh] overflow-y-auto scrollable-panel">
                <h2 className="text-lg font-black mb-4">⚙️ 교사용 스마트 시트 연동 가이드</h2>
                <ol className="list-decimal pl-4 text-xs space-y-2 mb-4 text-slate-300">
                    <li>새 구글 스프레드시트 생성 후 [확장 프로그램] &gt; [Apps Script] 진입</li>
                    <li>기존 코드 삭제 후 아래 코드를 복사하여 붙여넣습니다. (조회와 저장을 모두 처리합니다)</li>
                </ol>
                <div className="relative mb-4">
                    <pre className="bg-slate-900 p-3 rounded-lg text-[10px] overflow-x-auto text-green-400 border border-slate-700 font-mono"><code>{code}</code></pre>
                    <button onClick={handleCopy} className="absolute top-2 right-2 bg-slate-700 text-[10px] px-2 py-1 rounded text-white">{copied ? '✅ 복사 완료' : '📋 복사'}</button>
                </div>
                <ol className="list-decimal pl-4 text-xs space-y-2 mb-6 text-slate-300" start="3">
                    <li>Apps Script [새 배포] &gt; [웹 앱], 액세스 권한을 <b>'모든 사용자(Anyone)'</b>로 배포</li>
                    <li>부여받은 배포 주소(URL)를 이 소스코드 상단 <code className="bg-slate-900 text-amber-400 px-1 py-0.5 rounded">GOOGLE_SCRIPT_URL</code>에 입력하세요.</li>
                </ol>
                <Button onClick={onClose} className="w-full text-sm py-2.5" variant="secondary">가이드 닫기</Button>
            </div>
        </div>
    );
};

// ==========================================
// App 라우팅 및 전역 상태(랭킹) 관리
// ==========================================
const App = () => {
    const [view, setView] = useState('intro');
    const [gameData, setGameData] = useState(null);
    const [isGuideOpen, setIsGuideOpen] = useState(false);

    // 글로벌 랭킹 데이터 스토어
    const [leaders, setLeaders] = useState([]);
    const [isLoadingLeaders, setIsLoadingLeaders] = useState(false);
    const [leaderError, setLeaderError] = useState('');

    const fetchLeaderboard = useCallback(async () => {
        if (!GOOGLE_SCRIPT_URL) {
            setLeaderError("구글 시트 연동 URL이 설정되지 않았습니다.");
            return;
        }
        setIsLoadingLeaders(true);
        setLeaderError('');
        try {
            const res = await fetch(GOOGLE_SCRIPT_URL + "?t=" + Date.now());
            const rawData = await res.json();
            
            const scores = rawData.filter(d => d['유형'] === '점수');
            const mapped = scores.map(d => ({
                schoolName: d['학교'] || '',
                studentId: d['학번'],
                studentName: d['이름'],
                mode: d['모드'],
                score: Number(d['점수']) || 0
            }));
            setLeaders(mapped);
        } catch (e) {
            console.error("Sheet Fetch Error:", e);
            setLeaderError("명예의 전당 로드 실패. URL을 확인하세요.");
        } finally {
            setIsLoadingLeaders(false);
        }
    }, []);

    // 최초 로드 시 데이터 패치
    useEffect(() => {
        fetchLeaderboard();
    }, [fetchLeaderboard]);

    // 서버 데이터를 기반으로 등록된 모든 '학교 이름' 자동 추출 (중복 제거)
    const uniqueSchools = useMemo(() => {
        return [...new Set(leaders.map(l => l.schoolName).filter(Boolean))].sort();
    }, [leaders]);

    const navigate = (v) => { setView(v); history.pushState({view:v}, ''); };

    useEffect(() => {
        history.replaceState({view:'intro'}, '');
        const onPop = (e) => setView(e.state?.view || 'intro');
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
    }, []);

    // 뷰 전환 시 랭킹 자동 리프레시를 위한 래퍼
    const handleGameSubmit = () => {
        fetchLeaderboard();
        navigate('intro');
    };

    return (
        <div className="relative w-full h-screen-safe overflow-hidden font-sans text-slate-50 bg-slate-900">
            <div className="w-full h-full">
                {view === 'intro' && (
                    <IntroView 
                        onSelectMode={(mode) => navigate(mode)} 
                        onOpenReport={() => navigate('report')} 
                        onOpenGuide={() => setIsGuideOpen(true)}
                        leaders={leaders}
                        isLoading={isLoadingLeaders}
                        errorMsg={leaderError}
                        onRefresh={fetchLeaderboard}
                    />
                )}
                {(view === 'time' || view === 'mission' || view === 'survival' || view === 'zen') && (
                    <HexaConnectGame mode={view} onEnd={(s) => { setGameData({ score: s, mode: view }); navigate('result'); }} />
                )}
                {view === 'result' && (
                    <ResultView gameData={gameData} onSubmit={handleGameSubmit} uniqueSchools={uniqueSchools} />
                )}
                {view === 'report' && (
                    <FinalReportView onBack={handleGameSubmit} />
                )}
            </div>
            <AdminGuideModal isOpen={isGuideOpen} onClose={() => setIsGuideOpen(false)} />
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
